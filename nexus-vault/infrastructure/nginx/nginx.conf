# =============================================================================
# NEXUS VAULT — Enterprise nginx Main Configuration
# Handles: worker tuning, upstream pools, rate-limit zones, gzip, logging
# =============================================================================

user  nginx;
worker_processes  auto;               # 1 worker per CPU core
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Upstream pools ───────────────────────────────────────────────────────
    upstream backend {
        server backend:4000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # ── Rate limiting zones ──────────────────────────────────────────────────
    # General API zone: 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # Auth endpoints: 5 req/s per IP (stricter to prevent brute force)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    # File upload zone: 2 req/s per IP
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

    limit_req_status  429;

    # ── JSON access log format ───────────────────────────────────────────────
    log_format json_access escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_access buffer=32k flush=5s;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    server_tokens      off;          # hide nginx version

    # ── Buffer tuning ────────────────────────────────────────────────────────
    client_max_body_size    100m;    # max upload size
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    proxy_buffer_size         16k;
    proxy_buffers             8 32k;
    proxy_busy_buffers_size   64k;
    proxy_read_timeout        300s;
    proxy_connect_timeout     10s;
    proxy_send_timeout        120s;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/x-font-ttf
        font/opentype
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── Security ─────────────────────────────────────────────────────────────
    # Hide upstream errors
    proxy_intercept_errors on;

    # Unique request ID for tracing
    add_header X-Request-ID $request_id always;

    # ── Include virtual-host configs ─────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
