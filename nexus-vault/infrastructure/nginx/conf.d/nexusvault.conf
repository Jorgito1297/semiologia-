# =============================================================================
# NEXUS VAULT — nginx Virtual Host
# HTTP → HTTPS redirect + HTTPS server with TLS, rate limiting, security headers
# Replace 'yourdomain.com' with your actual domain.
# TLS certificates must be placed in ./infrastructure/nginx/certs/
# =============================================================================

# ── HTTP: redirect all traffic to HTTPS ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # ACME challenge for Let's Encrypt (comment out if using wildcard/uploaded certs)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main server block ─────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Modern TLS config (Mozilla Intermediate)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers (applied to all responses) ──────────────────────────
    add_header Strict-Transport-Security   "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options             "DENY"                                          always;
    add_header X-Content-Type-Options      "nosniff"                                       always;
    add_header X-XSS-Protection            "1; mode=block"                                 always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()"      always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' https://apis.google.com; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
         font-src 'self' https://fonts.gstatic.com; \
         img-src 'self' data: https:; \
         connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com; \
         frame-src 'none'; \
         object-src 'none';" always;

    # ── Shared proxy headers helper ──────────────────────────────────────────
    proxy_http_version   1.1;
    proxy_set_header     Host              $host;
    proxy_set_header     X-Real-IP         $remote_addr;
    proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header     X-Forwarded-Proto $scheme;
    proxy_set_header     X-Request-ID      $request_id;
    proxy_set_header     Connection        "";   # required for upstream keepalive

    # ── /health — backend health endpoint (no rate limit, no auth) ───────────
    location = /health {
        proxy_pass http://backend;
        access_log off;
    }

    # ── /metrics — BLOCK external access (Prometheus scrapes internally) ──────
    location = /metrics {
        deny all;
        return 403;
    }

    # ── /api/auth/* — strict rate limiting ───────────────────────────────────
    location ~ ^/api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://backend;
    }

    # ── /api/files (POST/PUT) — upload rate limiting ─────────────────────────
    location ~ ^/api/files$ {
        limit_req zone=upload_limit burst=5 nodelay;
        client_max_body_size 100m;
        proxy_pass http://backend;
        proxy_read_timeout 300s;
    }

    # ── /api/* — general API with standard rate limiting ─────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend;
    }

    # ── / — SPA frontend ─────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;

        # Cache static assets served through nginx proxy
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass http://frontend;
            expires 30d;
            add_header Cache-Control "public, must-revalidate";
            # Re-add security headers (location block resets them)
            add_header X-Frame-Options        "DENY"    always;
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    # ── Disable hidden files ─────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
