# =============================================================================
# NEXUS VAULT — Prometheus Configuration
# =============================================================================

global:
  scrape_interval:     15s   # how often to scrape
  evaluation_interval: 15s   # how often to evaluate rules
  scrape_timeout:      10s

  # Labels added to all time-series collected by this instance
  external_labels:
    environment: production
    project:     nexus-vault

# ── Alerting ────────────────────────────────────────────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ── Rule files ───────────────────────────────────────────────────────────────
# rule_files:
#   - /etc/prometheus/rules/*.yml

# ── Scrape configurations ─────────────────────────────────────────────────
scrape_configs:
  # ── NEXUS VAULT Backend ─────────────────────────────────────────────────
  - job_name: nexusvault-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:4000
        labels:
          service: backend
          env:     production
    # Optional: add basic auth if metrics endpoint is protected
    # basic_auth:
    #   username: prometheus
    #   password: METRICS_SECRET

  # ── PostgreSQL (via postgres_exporter sidecar) ───────────────────────────
  # Uncomment and add postgres_exporter service to docker-compose to enable
  # - job_name: postgres
  #   static_configs:
  #     - targets:
  #         - postgres-exporter:9187
  #       labels:
  #         service: postgres

  # ── Redis (via redis_exporter sidecar) ──────────────────────────────────
  # - job_name: redis
  #   static_configs:
  #     - targets:
  #         - redis-exporter:9121
  #       labels:
  #         service: redis

  # ── nginx (via nginx-prometheus-exporter sidecar) ───────────────────────
  # - job_name: nginx
  #   static_configs:
  #     - targets:
  #         - nginx-exporter:9113
  #       labels:
  #         service: nginx

  # ── Prometheus self-monitoring ───────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus
