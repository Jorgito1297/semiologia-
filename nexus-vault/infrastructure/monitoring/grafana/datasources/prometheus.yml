apiVersion: 1

# =============================================================================
# Grafana Datasource Provisioning — Prometheus
# =============================================================================
datasources:
  - name:      Prometheus
    type:      prometheus
    access:    proxy            # Grafana server contacts Prometheus (not the browser)
    url:       http://prometheus:9090
    isDefault: true
    editable:  false            # prevent accidental changes in UI
    jsonData:
      httpMethod:       POST
      timeInterval:     15s    # must match prometheus scrape_interval
      queryTimeout:     60s
      manageAlerts:     true
      alertmanagerUid: ""
