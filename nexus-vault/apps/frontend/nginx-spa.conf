# SPA nginx config — used inside the frontend container
# This file is separate from the main nginx reverse proxy config

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback (React Router) ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching (hashed filenames from Vite) ──────────────────
    location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options             "DENY"                            always;
    add_header X-Content-Type-Options      "nosniff"                         always;
    add_header X-XSS-Protection            "1; mode=block"                   always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()" always;

    # ── Disable access to hidden files ──────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Health endpoint (used by Docker healthcheck) ─────────────────────────
    location /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
