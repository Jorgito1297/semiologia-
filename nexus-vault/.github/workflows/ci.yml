name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Lint + Type-check
  # ──────────────────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Type-check
        run: npm run type-check --workspaces --if-present

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Backend tests with real PostgreSQL
  # ──────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       nexusvault_test
          POSTGRES_USER:     nexusvault
          POSTGRES_PASSWORD: test_password_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexusvault -d nexusvault_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=./prisma/schema.prisma

      - name: Run Prisma migrations (test DB)
        run: npx prisma migrate deploy --schema=./prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://nexusvault:test_password_ci@localhost:5432/nexusvault_test?schema=public

      - name: Run backend tests
        run: npm run test --workspace=apps/backend
        env:
          NODE_ENV:     test
          DATABASE_URL: postgresql://nexusvault:test_password_ci@localhost:5432/nexusvault_test?schema=public
          REDIS_URL:    redis://localhost:6379
          JWT_SECRET:   ci_test_jwt_secret_not_for_production
          FIREBASE_PROJECT_ID:    test-project
          FIREBASE_CLIENT_EMAIL:  test@test-project.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY:   "-----BEGIN PRIVATE KEY-----\nMIIEvAIBADANBgkqhkiG9w0BAQEFAASCBKYwggSiAgEAAoIBAQC7\n-----END PRIVATE KEY-----\n"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: apps/backend/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Frontend tests
  # ──────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test --workspace=apps/frontend --if-present
        env:
          VITE_FIREBASE_API_KEY:              ci-test-key
          VITE_FIREBASE_AUTH_DOMAIN:          test.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID:           test-project
          VITE_FIREBASE_STORAGE_BUCKET:       test.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID:  000000000000
          VITE_FIREBASE_APP_ID:               1:000000000000:web:test

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: Docker image builds (gate on tests passing)
  # ──────────────────────────────────────────────────────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-backend, test-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file:    ./apps/backend/Dockerfile
          target:  production
          push:    false
          tags:    nexusvault/backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          file:    ./apps/frontend/Dockerfile
          target:  production
          push:    false
          tags:    nexusvault/frontend:ci-${{ github.sha }}
          build-args: |
            VITE_API_URL=https://placeholder.example.com
            VITE_FIREBASE_PROJECT_ID=ci-build-only
            VITE_APP_NAME=NEXUS VAULT
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Job 5: Push to registry (only on main branch merges)
  # ──────────────────────────────────────────────────────────────────────────
  push-registry:
    name: Push to Container Registry
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Push backend image
        uses: docker/build-push-action@v5
        with:
          context:   ./apps/backend
          file:      ./apps/backend/Dockerfile
          target:    production
          push:      true
          tags:      ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          labels:    ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context:   ./apps/frontend
          file:      ./apps/frontend/Dockerfile
          target:    production
          push:      true
          tags:      ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          labels:    ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
