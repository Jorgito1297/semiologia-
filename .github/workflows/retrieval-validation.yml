name: retrieval-validation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  retrieval-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/ci/validate-retrieval.cjs
