name: security-validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  security-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
